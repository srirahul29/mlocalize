version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mlocalize
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mlocalize?schema=public
      - JWT_SECRET=super-secret-key-change-me-in-production
      - JWT_EXPIRES_IN=1d
      - PORT=3000
    depends_on:
      - db

volumes:
  postgres_data:
